<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris 2026 — My Places</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1510;
    --blush: #c4785a;
    --gold: #b8953a;
    --sage: #6b7c5e;
    --muted: #7a6f63;
    --border: #ddd5c4;
    --white: #fdfaf5;
    --cat-restaurant: #c4785a;
    --cat-cafe: #6b7c5e;
    --cat-shop: #b8953a;
    --cat-bar: #7a5c8a;
    --cat-hotel: #4a7a8a;
    --cat-sight: #5a7a5a;
    --cat-other: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    border-bottom: 3px solid var(--gold);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 400;
    letter-spacing: .04em;
    line-height: 1.1;
  }
  header h1 em { color: var(--gold); font-style: italic; }
  header p { margin-top: .5rem; color: #b0a898; font-size: .95rem; letter-spacing: .08em; text-transform: uppercase; }

  /* NAV TABS */
  nav {
    display: flex;
    justify-content: center;
    gap: 0;
    background: var(--white);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  nav button {
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all .2s;
  }
  nav button.active, nav button:hover {
    color: var(--blush);
    border-bottom-color: var(--blush);
  }

  /* MAIN */
  .panel { display: none; padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .panel.active { display: block; }

  /* ARR SELECTOR */
  .arr-nav {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    margin-bottom: 2rem;
  }
  .arr-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    padding: .45rem 1rem;
    border: 2px solid var(--border);
    background: var(--white);
    color: var(--muted);
    border-radius: 2rem;
    cursor: pointer;
    transition: all .2s;
  }
  .arr-btn.active, .arr-btn:hover {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }

  /* TABLE */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    margin-bottom: 1.2rem;
    padding-bottom: .5rem;
    border-bottom: 2px solid var(--border);
    color: var(--ink);
  }
  .section-title span {
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    font-weight: 400;
    color: var(--muted);
    margin-left: .75rem;
    letter-spacing: .04em;
  }
  .cat-group { margin-bottom: 2rem; }
  .cat-label {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: .3rem .8rem;
    border-radius: 2rem;
    margin-bottom: .8rem;
    color: white;
  }
  .cat-Restaurant { background: var(--cat-restaurant); }
  .cat-Café { background: var(--cat-cafe); }
  .cat-Shop { background: var(--cat-shop); }
  .cat-Bar { background: var(--cat-bar); }
  .cat-Hotel { background: var(--cat-hotel); }
  .cat-Sight { background: var(--cat-sight); }
  .cat-Other { background: var(--cat-other); }

  table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: .5rem; }
  thead tr { background: var(--ink); color: var(--cream); }
  thead th { padding: .7rem 1rem; text-align: left; font-size: .78rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0ebe0; }
  tbody td { padding: .7rem 1rem; font-size: .9rem; vertical-align: top; }
  td.name { font-weight: 500; color: var(--ink); }
  td.note { color: var(--muted); font-size: .85rem; font-style: italic; }
  td.addr { color: var(--muted); font-size: .82rem; }

  /* MAPS */
  .map-intro { color: var(--muted); margin-bottom: 1.5rem; font-size: .95rem; line-height: 1.6; }
  .map-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.12); margin-bottom: 2rem; }
  .leaflet-map { height: 420px; width: 100%; }
  .place-list-under { margin-top: 1rem; }
  .place-pill {
    display: inline-block;
    font-size: .8rem;
    padding: .25rem .7rem;
    border-radius: 2rem;
    margin: .2rem;
    color: white;
    cursor: default;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem 1.5rem;
    margin-bottom: 1.5rem;
    font-size: .82rem;
  }
  .legend-item { display: flex; align-items: center; gap: .4rem; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 600px) {
    header h1 { font-size: 2rem; }
    nav button { padding: .75rem 1rem; font-size: .8rem; }
    .panel { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Paris <em>2026</em></h1>
  <p>Curated Places — Organized by Arrondissement</p>
</header>

<nav>
  <button class="active" onclick="showPanel('table', this)">📋 Table View</button>
  <button onclick="showPanel('maps', this)">🗺️ Maps by Arrondissement</button>
</nav>

<!-- TABLE PANEL -->
<div class="panel active" id="panel-table">
  <div class="arr-nav" id="table-arr-nav"></div>
  <div id="table-content"></div>
</div>

<!-- MAPS PANEL -->
<div class="panel" id="panel-maps">
  <p class="map-intro">Select an arrondissement below to see an interactive map of your saved places. Tap any marker for details. Maps use OpenStreetMap — works offline if you save the page.</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-restaurant)"></div> Restaurant</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-cafe)"></div> Café / Bakery</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-shop)"></div> Shop</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-bar)"></div> Bar</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-hotel)"></div> Hotel</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cat-sight)"></div> Sight</div>
  </div>
  <div class="arr-nav" id="map-arr-nav"></div>
  <div id="map-content"></div>
</div>

function getColor(cat) {
  const map = {
    'Restaurant':'#c4785a','Café / Bakery':'#6b7c5e','Shop':'#b8953a',
    'Bar':'#7a5c8a','Hotel':'#4a7a8a','Sight':'#5a7a5a','Other':'#888'
  };
  return map[cat] || '#888';
}
function getCatClass(cat) { return 'cat-' + cat.split('/')[0].trim(); }

function cleanNote(type) {
  return type.replace(/^(Restaurant|Café|Cafe|Caf\u00e9|Shop|Bar|Hotel|Boulangerie|Patisserie|Distillery)\s*[-–]\s*/i,'').replace(/^(Shops|Restaurant|Café|Shop|Bar|Hotel)$/i,'').trim();
}

function lookupGeo(addr) {
  const postcode = addr.match(/750(\d\d)/);
  if (!postcode) return null;
  const arr = postcode[0];
  for (const key in GEO) {
    if (addr.includes(key) || key.startsWith(addr.split(',')[0])) return GEO[key];
  }
  // Partial match on street
  const street = addr.split(',')[0].trim();
  for (const key in GEO) {
    if (key.includes(street) || street.includes(key.split(',')[0])) return GEO[key];
  }
  // Fallback: use post code center
  const arrCenters = {
    '75001':[48.861,2.347],'75002':[48.866,2.347],'75003':[48.861,2.358],
    '75004':[48.853,2.352],'75005':[48.847,2.347],'75006':[48.850,2.335],
    '75007':[48.856,2.310],'75008':[48.874,2.308],'75009':[48.876,2.338],
    '75010':[48.870,2.360],'75011':[48.858,2.377],'75014':[48.833,2.326],
    '75016':[48.863,2.275],'75017':[48.884,2.307],'75018':[48.890,2.344]
  };
  return arrCenters[arr] || null;
}

function showArr(arr, btn, mode) {
  if (mode === 'table') {
    document.querySelectorAll('#table-arr-nav .arr-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(arr);
  } else {
    document.querySelectorAll('#map-arr-nav .arr-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMap(arr);
  }
}

function renderTable(arr) {
  const cats = DATA[arr];
  const total = Object.values(cats).flat().length;
  let html = `<div class="section-title">
    <em style="font-family:'Playfair Display',serif">${ARR_NAMES[arr]}</em>
    <span>${total} place${total!==1?'s':''}</span>
  </div>`;
  for (const cat in cats) {
    const items = cats[cat];
    const cls = getCatClass(cat);
    html += `<div class="cat-group">
      <div class="cat-label ${cls}">${cat}</div>
      <table>
        <thead><tr><th>Name</th><th>Notes</th><th>Address</th></tr></thead>
        <tbody>`;
    items.forEach(p => {
      const note = cleanNote(p.Type);
      html += `<tr>
        <td class="name">${p.URL ? `<a href="${p.URL}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--blush)">${p.Name}</a>` : p.Name}</td>
        <td class="note">${note}</td>
        <td class="addr">${p.Address.replace(', France','')}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  tableContent.innerHTML = html;
}

    currentMap = map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    const bounds = [];
    markerData.forEach(({ geo, color, cat, note, name, addr, url }) => {
      if (!geo) return;
      bounds.push(geo);
      const icon = L.divIcon({
        html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
        className: '', iconSize: [14,14], iconAnchor: [7,7]
      });
      L.marker(geo, { icon }).addTo(map)
        .bindPopup(`${url ? `<a href="${url}" target="_blank" rel="noopener" style="color:inherit;font-weight:700;text-decoration:underline;text-underline-offset:2px">${name}</a>` : `<strong>${name}</strong>`}<br><em style="color:${color};font-size:.82em">${cat}</em>${note ? '<br>' + note : ''}<br><small style="color:#888">${addr.replace(', France','')}</small>`, { maxWidth: 220 });
    });

    if (bounds.length) {
      map.fitBounds(bounds, { padding: [40, 40] });
    } else {
      map.setView(arrCenters[arr] || [48.856, 2.347], 15);
    }
    map.invalidateSize();
  }, 50);
}
// Don't render map on load — panel is hidden and Leaflet can't size correctly
// Map renders on first switch to the Maps tab

function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'maps') {
    // Always re-render so Leaflet sizes correctly after panel becomes visible
    const activeArr = document.querySelector('#map-arr-nav .arr-btn.active');
    const arr = activeArr ? activeArr.textContent.replace(/e$/, '') : arrList[0];
    renderMap(arr);
  }
}
</script>
